version: "3.9"

services:
  # ── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: meetmind-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (FastAPI) ─────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: meetmind-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://meetmind:meetmind@postgres:5432/meetmind
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./backend/app:/app/app
      - meetmind_uploads:/app/uploads
      - meetmind_frames:/app/frames
      - meetmind_audio:/app/audio
      - meetmind_models:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meetmind-postgres
    environment:
      POSTGRES_DB: meetmind
      POSTGRES_USER: meetmind
      POSTGRES_PASSWORD: meetmind
    ports:
      - "5432:5432"
    volumes:
      - meetmind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmind -d meetmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Qdrant ────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: meetmind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - meetmind_qdrant:/qdrant/storage
    restart: unless-stopped

volumes:
  meetmind_pg:
  meetmind_qdrant:
  meetmind_uploads:
  meetmind_frames:
  meetmind_audio:
  meetmind_models:
